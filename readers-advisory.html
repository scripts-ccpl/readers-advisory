<!DOCTYPE html>
<html>
<head>
    <title>Readers Advisory</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 40px;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        select, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }
    </style>
</head>
<body>

    <h1>Readers Advisory</h1>

    <div class="card">
        <h3>Select a Genre</h3>

        <select id="genre">
            <option value="">--Choose Genre--</option>
            <option value="mystery">Mystery</option>
            <option value="fantasy">Fantasy</option>
            <option value="romance">Romance</option>
            <option value="scifi">Sci-Fi</option>
        </select>

        <button onclick="recommendBook()">Find Books</button>

        <p id="result"></p>
    </div>

    <script>
        function recommendBook() {
            const genre = document.getElementById("genre").value;
            const result = document.getElementById("result");

            if (!genre) {
                result.innerText = "Please select a genre.";
                return;
            }

            const books = {
                mystery: "Try 'Gone Girl'",
                fantasy: "Try 'Harry Potter'",
                romance: "Try 'Pride and Prejudice'",
                scifi: "Try 'Dune'"
            };

            result.innerText = books[genre];
        }
    </script>

</body>
</html>
