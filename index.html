<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCPL Readers' Advisory</title>
  <style>
    :root{
      --ccpl-blue:#215D70;
      --ccpl-gold:#f2b134;
      --bg:#215D70;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#dbe3ea;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:24px;
    }

    .hero{
      background:linear-gradient(135deg, var(--ccpl-blue), #2c6aa0);
      color:#fff;
      border-radius:18px;
      padding:28px;
      box-shadow:0 8px 24px rgba(0,0,0,.12);
      margin-bottom:22px;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:2rem;
    }

    .hero p{
      margin:0;
      font-size:1rem;
      line-height:1.55;
      max-width:800px;
    }

    .grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:22px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:22px;
      box-shadow:0 4px 14px rgba(0,0,0,.06);
    }

    h2{
      margin-top:0;
      font-size:1.2rem;
      color:var(--ccpl-blue);
    }

    .search-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    input[type="text"]{
      flex:1 1 320px;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:12px;
      font-size:1rem;
    }

    button{
      border:none;
      border-radius:12px;
      padding:11px 16px;
      font-size:.96rem;
      cursor:pointer;
      transition:.2s ease;
    }

    .primary{
      background:var(--ccpl-blue);
      color:#fff;
    }

    .primary:hover{opacity:.92}

    .ghost{
      background:#eef4f9;
      color:var(--ccpl-blue);
      border:1px solid #cbd9e6;
    }

    .ghost:hover{
      background:#e3edf6;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .chip{
      background:#fff;
      color:var(--ccpl-blue);
      border:1px solid #c7d6e4;
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font-size:.93rem;
    }

    .chip.active{
      background:var(--ccpl-gold);
      border-color:var(--ccpl-gold);
      color:#1f2937;
      font-weight:bold;
    }

    .section-label{
      font-size:.93rem;
      font-weight:bold;
      margin:18px 0 10px;
      color:#374151;
    }

    .summary{
      background:#f9fbfd;
      border:1px dashed #cbd5e1;
      border-radius:14px;
      padding:14px;
      margin-top:18px;
      line-height:1.55;
    }

    .summary strong{
      color:var(--ccpl-blue);
    }

    .quick-links{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
      margin-top:14px;
    }

    .quick-links button{
      width:100%;
      text-align:left;
    }

    .footer-note{
      margin-top:18px;
      color:var(--muted);
      font-size:.9rem;
      line-height:1.45;
    }

    @media (max-width: 860px){
      .grid{
        grid-template-columns:1fr;
      }
      .quick-links{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Cecil County Public Library Readers’ Advisory</h1>
      <p>
        Choose a genre, add tags, or type your own keywords to search the CCPL catalog.
      </p>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Find Your Next Read</h2>

        <div class="search-row">
          <input id="keywordInput" type="text" placeholder="Type a title, theme, mood, or keyword..." />
          <button class="primary" onclick="runSearch()">Search Catalog</button>
          <button class="ghost" onclick="clearSelections()">Clear</button>
        </div>

        <div class="section-label">Genres</div>
        <div class="chips" id="genreChips">
          <button class="chip" data-type="genre" data-value="mystery">Mystery</button>
          <button class="chip" data-type="genre" data-value="thriller">Thriller</button>
          <button class="chip" data-type="genre" data-value="romance">Romance</button>
          <button class="chip" data-type="genre" data-value="historical fiction">Historical Fiction</button>
          <button class="chip" data-type="genre" data-value="science fiction">Science Fiction</button>
          <button class="chip" data-type="genre" data-value="fantasy">Fantasy</button>
          <button class="chip" data-type="genre" data-value="horror">Horror</button>
          <button class="chip" data-type="genre" data-value="biography">Biography</button>
          <button class="chip" data-type="genre" data-value="memoir">Memoir</button>
          <button class="chip" data-type="genre" data-value="young adult">Young Adult</button>
          <button class="chip" data-type="genre" data-value="graphic novel">Graphic Novel</button>
          <button class="chip" data-type="genre" data-value="cookbooks">Cookbooks</button>
        </div>

        <div class="section-label">Tags</div>
        <div class="chips" id="tagChips">
          <button class="chip" data-type="tag" data-value="fast-paced">Fast-Paced</button>
          <button class="chip" data-type="tag" data-value="cozy">Cozy</button>
          <button class="chip" data-type="tag" data-value="dark">Dark</button>
          <button class="chip" data-type="tag" data-value="funny">Funny</button>
          <button class="chip" data-type="tag" data-value="heartwarming">Heartwarming</button>
          <button class="chip" data-type="tag" data-value="suspenseful">Suspenseful</button>
          <button class="chip" data-type="tag" data-value="found family">Found Family</button>
          <button class="chip" data-type="tag" data-value="strong female lead">Strong Female Lead</button>
          <button class="chip" data-type="tag" data-value="diverse voices">Diverse Voices</button>
          <button class="chip" data-type="tag" data-value="book club">Book Club</button>
          <button class="chip" data-type="tag" data-value="coming of age">Coming of Age</button>
          <button class="chip" data-type="tag" data-value="historical setting">Historical Setting</button>
        </div>

        <div class="summary" id="selectionSummary">
          <strong>Current search:</strong> none selected yet.
        </div>
      </div>

      <div class="card">
        <h2>Quick Picks</h2>
        <p>Select a ready-made search:</p>

        <div class="quick-links">
          <button class="ghost" onclick="quickSearch('mystery cozy')">Cozy Mystery</button>
          <button class="ghost" onclick="quickSearch('romance funny')">Funny Romance</button>
          <button class="ghost" onclick="quickSearch('historical fiction book club')">Historical Book Club</button>
          <button class="ghost" onclick="quickSearch('fantasy found family')">Fantasy + Found Family</button>
          <button class="ghost" onclick="quickSearch('thriller suspenseful')">Suspenseful Thriller</button>
          <button class="ghost" onclick="quickSearch('young adult coming of age')">YA Coming-of-Age</button>
          <button class="ghost" onclick="quickSearch('biography inspiring')">Inspiring Biography</button>
          <button class="ghost" onclick="quickSearch('graphic novel diverse voices')">Diverse Graphic Novels</button>
        </div>

        <div class="footer-note">
        </div>
      </div>
    </div>
  </div>

  <script>
    const selectedGenres = new Set();
    const selectedTags = new Set();

    const catalogBase = "https://ceco.ent.sirsi.net/client/en_US/default/search/results?qu=";

    document.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => {
        const type = chip.dataset.type;
        const value = chip.dataset.value;

        chip.classList.toggle("active");

        if (type === "genre") {
          chip.classList.contains("active")
            ? selectedGenres.add(value)
            : selectedGenres.delete(value);
        } else {
          chip.classList.contains("active")
            ? selectedTags.add(value)
            : selectedTags.delete(value);
        }

        updateSummary();
      });
    });

    function buildQuery() {
      const typed = document.getElementById("keywordInput").value.trim();
      const parts = [
        ...Array.from(selectedGenres),
        ...Array.from(selectedTags)
      ];

      if (typed) parts.unshift(typed);

      return parts.join(" ");
    }

    function runSearch() {
      const query = buildQuery();
      if (!query) {
        alert("Please choose a genre, a tag, or type a keyword first.");
        return;
      }

      const url = catalogBase + encodeURIComponent(query);
      window.open(url, "_blank");
    }

    function quickSearch(query) {
      window.open(catalogBase + encodeURIComponent(query), "_blank");
    }

    function clearSelections() {
      selectedGenres.clear();
      selectedTags.clear();
      document.getElementById("keywordInput").value = "";
      document.querySelectorAll(".chip").forEach(chip => chip.classList.remove("active"));
      updateSummary();
    }

    function updateSummary() {
      const typed = document.getElementById("keywordInput").value.trim();
      const genres = Array.from(selectedGenres);
      const tags = Array.from(selectedTags);

      let text = "";

      if (typed) text += `Keyword: "${typed}"`;
      if (genres.length) text += `${text ? " | " : ""}Genres: ${genres.join(", ")}`;
      if (tags.length) text += `${text ? " | " : ""}Tags: ${tags.join(", ")}`;

      if (!text) text = "none selected yet.";

      document.getElementById("selectionSummary").innerHTML =
        `<strong>Current search:</strong> ${text}`;
    }

    document.getElementById("keywordInput").addEventListener("input", updateSummary);
  </script>
</body>
</html>
